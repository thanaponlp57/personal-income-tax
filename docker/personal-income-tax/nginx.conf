# CORS allowlist — only the shell's origin may fetch federation assets.
# Add the production shell origin here when deploying (one line per origin).
map $http_origin $cors_origin {
    default "";
    "http://localhost:4200" $http_origin;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # remoteEntry.json — host must always see the latest version
    location = /remoteEntry.json {
        add_header Cache-Control "no-cache";
        # "always" = attach CORS headers on error responses too, so the browser
        # reports the real status instead of a misleading CORS error.
        # empty $cors_origin (origin not allowlisted) → header is omitted entirely
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        # Vary: Origin — the browser caches per-Origin, so a same-origin visit
        # (no Origin header → no CORS header) can't poison the cross-origin cache
        add_header Vary "Origin" always;
        try_files $uri =404;
    }

    # index.html — no-cache so new deployments are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # hashed assets — immutable, cache for 1 year
    # CORS required: the host fetches federation chunks (routes-*.js, shared
    # _angular_*.js, rxjs*.js) cross-origin, not just remoteEntry.json.
    # nginx add_header does NOT inherit across location blocks.
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Vary "Origin" always;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
