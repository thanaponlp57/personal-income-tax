events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # CORS: only allow the shell origin to fetch remote federation assets.
    map $http_origin $cors_origin {
        default                        "";
        "https://taxfe.local:4200"     $http_origin;
    }

    # Shell — :4200
    server {
        listen 4200 ssl;
        server_name taxfe.local;

        ssl_certificate     /etc/nginx/ssl/taxfe.local.pem;
        ssl_certificate_key /etc/nginx/ssl/taxfe.local-key.pem;

        root /usr/share/nginx/shell;
        index index.html;

        location = /index.html {
            add_header Cache-Control "no-cache";
        }

        location = /federation.manifest.json {
            add_header Cache-Control "no-cache";
        }

        location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # BFF same-origin: proxy auth/session paths ต่อไป BE — cookie จึงเป็น first-party
        # ของ taxfe.local (ไม่โดน 3rd-party cookie block ใน Safari). ดู task-09/task-10
        location ~ ^/(api|oauth2|login|logout) {
            proxy_pass             https://taxbe.local:8080;
            proxy_ssl_server_name  on;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Forwarded-Host  $http_host;   # taxfe.local:4200 → BE สร้าง redirect_uri ถูก
            proxy_set_header       X-Forwarded-Proto $scheme;       # https
            proxy_set_header       X-Forwarded-Port  $server_port;  # 4200
            proxy_set_header       X-Real-IP         $remote_addr;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Remote — :4201
    server {
        listen 4201 ssl;
        server_name taxfe.local;

        ssl_certificate     /etc/nginx/ssl/taxfe.local.pem;
        ssl_certificate_key /etc/nginx/ssl/taxfe.local-key.pem;

        root /usr/share/nginx/remote;
        index index.html;

        location = /remoteEntry.json {
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Vary "Origin" always;
            try_files $uri =404;
        }

        location = /index.html {
            add_header Cache-Control "no-cache";
        }

        location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Vary "Origin" always;
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
